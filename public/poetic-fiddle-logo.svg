<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<!--
  Poetic Fiddle logo mark
  A stylised violin: the Poetic framework's fountain-pen nib, flipped
  upright to form the violin body, with a neck and pegbox added. The
  vent hole and slit remain as cut-outs.

  Colour:     #534AB7 (purple)
  Canvas:     72 x 88 px viewBox (portrait)
  Background: transparent; suitable for use over any surface

  Construction:
  The nib body is a filled path. The vent hole (ellipse) and slit
  (rectangle) are cut out via an SVG mask rather than an even-odd
  compound path. The mask is a NOT AND operation: it subtracts the
  vent and slit from the nib wherever they overlap, and any overflow
  of those shapes beyond the nib boundary is harmless because there
  is nothing there to unmask.

  The slit rectangle is extended upward to y=30 (well inside the
  vent ellipse, whose top sits at y=29) so that the two cutouts
  overlap by 13 px and there is no gap or artefact at their junction.
  It is also extended to y=74 (2 px past the nib tip at y=72) so
  there is no edge-case artefact at the very point.

  Favicon use:
  Modern browsers accept SVG favicons directly. Add to your HTML head:
    link rel="icon" href="poetic-fiddle-logo.svg" type="image/svg+xml"
    link rel="icon" href="poetic-fiddle-logo.png" (legacy fallback)
  For the PNG fallback, rasterise at 32 x 32 px and 16 x 16 px.
-->

<svg
   viewBox="0 0 72 88"
   role="img"
   aria-labelledby="poetic-logo-title"
   version="1.1"
   id="svg2"
   sodipodi:docname="poetic-fiddle-logo.svg"
   inkscape:version="1.4.3 (0d15f75, 2025-12-25)"
   width="72"
   height="88"
   xmlns:inkscape="http://www.inkscape.org/namespaces/inkscape"
   xmlns:sodipodi="http://sodipodi.sourceforge.net/DTD/sodipodi-0.dtd"
   xmlns="http://www.w3.org/2000/svg"
   xmlns:svg="http://www.w3.org/2000/svg"
   xmlns:rdf="http://www.w3.org/1999/02/22-rdf-syntax-ns#"
   xmlns:cc="http://creativecommons.org/ns#"
   xmlns:dc="http://purl.org/dc/elements/1.1/">
  <sodipodi:namedview
     id="namedview2"
     pagecolor="#505050"
     bordercolor="#ffffff"
     borderopacity="1"
     inkscape:showpageshadow="0"
     inkscape:pageopacity="0"
     inkscape:pagecheckerboard="1"
     inkscape:deskcolor="#505050"
     inkscape:zoom="8"
     inkscape:cx="36"
     inkscape:cy="44"
     inkscape:window-width="1920"
     inkscape:window-height="1000"
     inkscape:window-x="-8"
     inkscape:window-y="-8"
     inkscape:window-maximized="1"
     inkscape:current-layer="svg2" />
  <title
     id="poetic-logo-title">Poetic Fiddle</title>
  <desc
     id="desc1">
    A stylised violin — the logo mark for Poetic Fiddle, a web editor
    for the Poetic poem-authoring framework. The body is Poetic's
    fountain-pen nib flipped upright; the vent hole and slit are
    transparent cut-outs that reveal whatever surface the logo is on.
  </desc>
  <defs
     id="defs2">
    <!--
      nib-mask: white = keep (visible), black = cut out (transparent).
      The full-canvas white rect makes the nib body visible everywhere,
      then the ellipse and rectangle punch the vent and slit through.
    -->
    <mask
       id="nib-mask">
      <rect
         x="0"
         y="0"
         width="80"
         height="80"
         fill="#ffffff"
         id="rect1" />
      <ellipse
         cx="40"
         cy="36"
         rx="5"
         ry="7"
         fill="#000000"
         id="ellipse1" />
      <rect
         x="39.25"
         y="30"
         width="1.5"
         height="44"
         fill="#000000"
         id="rect2" />
    </mask>
  </defs>
  <!-- Violin body: the Poetic nib, flipped upright (lightly waisted) -->
  <path
     d="M 32 0 L 40 0 L 38 3 L 34 3 Z"
     id="pegbox"
     style="fill:#534ab7;fill-opacity:1;stroke:none"
  />
  <rect
     height="32"
     id="neck_left"
     style="fill:#534ab7;fill-opacity:1;stroke:none;"
     width="1.25"
     x="34"
     y="2"
  />
  <rect
     height="32"
     id="neck_right"
     style="fill:#534ab7;fill-opacity:1;stroke:none;"
     width="1.25"
     x="36.75"
     y="2"
  />
  <path
     d="M 40,72 36,68 22,44 28,34 22,25 28,16 h 24 l 6,9 -6,9 6,10 L 44,68 Z"
     id="corpus"
     mask="url(#nib-mask)"
     style="fill:#534ab7;fill-opacity:1"
     transform="matrix(1,0,0,-1,-4,103.5)"
  />
  <metadata
     id="metadata6">
    <rdf:RDF>
      <cc:Work
         rdf:about="https://www.poeticfiddle.com">
        <dc:title>Poetic Fiddle</dc:title>
      </cc:Work>
    </rdf:RDF>
  </metadata>
</svg>
