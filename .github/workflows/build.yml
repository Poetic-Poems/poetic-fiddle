name: Build

# CI backstop for the Next.js app: installs, lints, typechecks, checks
# formatting, tests, and builds on every pull request and push to main, so a
# broken app never lands on main. Mirrors codeql.yml/commit-format.yml's
# structure and comment style.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Check formatting
        run: npm run format:check

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
