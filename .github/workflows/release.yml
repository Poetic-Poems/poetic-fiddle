name: Release

# Triggered by a push to main that changes package.json (normally a
# "chore: release vX.Y.Z" commit bumping the version field). package.json's
# version is the single source of truth: this workflow tags the commit that
# introduced it and publishes the GitHub release, so the tag can never drift
# out of sync with the version the commit itself is bumping to.
on:
  push:
    branches:
      - main
    paths:
      - package.json

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Read version from package.json
        id: version
        run: |
          version=$(node -p "require('./package.json').version")
          echo "tag=v${version}" >> "$GITHUB_OUTPUT"

      - name: Check whether this version is already tagged
        id: check
        run: |
          if git rev-parse "${{ steps.version.outputs.tag }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Tag this commit
        if: steps.check.outputs.exists == 'false'
        run: |
          git tag "${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Create GitHub release
        if: steps.check.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
            --title "Poetic ${{ steps.version.outputs.tag }}" \
            --generate-notes
